services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home

  mongo:
    image: mongo:7
    container_name: finance-tracker-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  finance-tracker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: finance-tracker
    depends_on:
      - mongo
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/expense_tracker
    restart: unless-stopped

volumes:
  jenkins_home:
  mongo-data:
